<!DOCTYPE html>
<html lang="es">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEX Network Hosting - Planes de Hosting</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            background: 
                radial-gradient(circle at 20% 30%, rgba(138, 43, 226, 0.18) 0%, transparent 45%),
                radial-gradient(circle at 80% 70%, rgba(0, 255, 255, 0.15) 0%, transparent 45%),
                linear-gradient(180deg, #020108 0%, #0a041a 40%, #000000 100%);
            position: relative;
            overflow-x: hidden;
            color: white;
            padding: 20px 10px;
        }

        .fondo-lobo {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 1100px;
            height: auto;
            opacity: 0.08;
            z-index: 0;
            pointer-events: none;
            filter: drop-shadow(0 0 30px rgba(138, 43, 226, 0.5)) drop-shadow(0 0 60px rgba(0, 255, 255, 0.3));
            animation: respiroLobo 8s ease-in-out infinite;
        }

        @keyframes respiroLobo {
            0%, 100% { opacity: 0.07; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.1; transform: translate(-50%, -50%) scale(1.02); }
        }

        .particulas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(2px 2px at 15px 25px, rgba(200, 150, 255, 0.9), transparent),
                radial-gradient(1.5px 1.5px at 50px 60px, rgba(0, 255, 255, 0.7), transparent),
                radial-gradient(1px 1px at 85px 35px, rgba(255, 255, 255, 0.8), transparent),
                radial-gradient(1.5px 1.5px at 140px 100px, rgba(255, 0, 255, 0.6), transparent),
                radial-gradient(1px 1px at 200px 70px, rgba(255, 255, 255, 0.9), transparent);
            background-repeat: repeat;
            background-size: 300px 180px;
            animation: moverParticulas 60s linear infinite;
            opacity: 0.7;
            will-change: transform;
        }

        @keyframes moverParticulas {
            from { transform: translateY(0px); }
            to { transform: translateY(-180px); }
        }

        @keyframes rgbMorado {
            0% { border-color: #9933ff; box-shadow: 0 0 15px #9933ff, inset 0 0 5px rgba(153, 51, 255, 0.2); }
            50% { border-color: #ff33ff; box-shadow: 0 0 20px #ff33ff, inset 0 0 5px rgba(255, 51, 255, 0.2); }
            100% { border-color: #9933ff; box-shadow: 0 0 15px #9933ff, inset 0 0 5px rgba(153, 51, 255, 0.2); }
        }

        @keyframes brilloDestacado {
            0% { box-shadow: 0 0 20px rgba(37, 211, 102, 0.4); }
            50% { box-shadow: 0 0 35px rgba(37, 211, 102, 0.7); }
            100% { box-shadow: 0 0 20px rgba(37, 211, 102, 0.4); }
        }

        @keyframes RGB {
            0% { background-position: 0%; }
            100% { background-position: 800%; }
        }

        @keyframes Pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.85; }
            100% { transform: scale(1); opacity: 1; }
        }

        .contenedor {
            position: relative;
            z-index: 2;
            max-width: 1200px;
            margin: 0 auto;
            text-align: center;
        }

        .cabecera {
            margin-bottom: 45px;
        }

        .nombre-empresa {
            font-size: 48px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-family: 'Orbitron', sans-serif;
            background: linear-gradient(90deg, #ff0000, #ff7300, #ffe600, #00ff00, #00ffff, #004cff, #8f00ff, #ff0080, #ff0000);
            background-size: 800%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: RGB 10s linear infinite;
            text-shadow: 0 0 10px rgba(255,255,255,.5), 0 0 20px rgba(255,0,255,.5), 0 0 40px rgba(0,255,255,.5);
        }

        .subtitulo {
            margin-top: 12px;
            font-size: 20px;
            font-family: 'Poppins', sans-serif;
            color: #ffffff;
            text-shadow: 0 0 8px #00ffff, 0 0 18px #7d00ff;
            animation: Pulse 2s infinite;
        }

        .info-cambio {
            margin: 15px 0 25px;
            font-size: 0.9rem;
            color: #ff99ff;
            background: rgba(15, 8, 35, 0.5);
            padding: 8px;
            border-radius: 8px;
            display: inline-block;
            border: 1px solid rgba(138, 43, 226, 0.3);
        }

        .volver {
            margin-bottom: 25px;
            display: inline-block;
        }

        .btn-volver {
            color: #00ffff;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s ease;
            display: flex; align-items: center; gap: 8px; justify-content: center;
        }

        .btn-volver:hover {
            color: #ff99ff;
            transform: translateX(-5px);
        }

        .grid-planes {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .tarjeta-plan {
            background: rgba(25, 15, 50, 0.65);
            backdrop-filter: blur(12px);
            border-radius: 16px;
            padding: 20px 15px;
            border: 2px solid #9933ff;
            transition: all 0.3s ease;
            text-align: center;
            animation: rgbMorado 3s linear infinite;
            position: relative; overflow: hidden;
        }

        .tarjeta-plan:hover {
            transform: translateY(-5px);
            border-width: 3px;
        }

        .tarjeta-plan.destacado {
            border-color: #25D366;
            animation: brilloDestacado 2s infinite ease-in-out;
            transform: scale(1.02);
        }

        .etiqueta-destacado {
            position: absolute; top: 12px; right: -35px;
            background: #25D366; color: white;
            padding: 5px 35px; font-size: 0.7rem; font-weight: 700;
            transform: rotate(45deg);
            box-shadow: 0 2px 10px rgba(37, 211, 102, 0.4);
        }

        .nombre-plan {
            font-size: 1.3rem; font-weight: 700; color: #ffffff;
            margin-bottom: 8px; font-family: 'Orbitron', sans-serif;
        }

        .precio-usd {
            font-size: 1.6rem; font-weight: 900; color: #00ffff;
            margin-bottom: 4px; text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }

        .precio-cop {
            font-size: 1rem; color: #ff99ff; margin-bottom: 15px; font-weight: 500;
        }

        .caracteristicas {
            list-style: none; margin-bottom: 20px; text-align: left; font-size: 0.9rem;
        }

        .caracteristicas li {
            padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.1);
            color: #ddddff; display: flex; align-items: center; gap: 6px;
        }

        .caracteristicas li::before { content: "✅"; font-size: 0.75rem; }

        .btn-comprar {
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
            width: 100%; padding: 12px;
            background: linear-gradient(90deg, #25D366, #1da851);
            color: white; text-decoration: none; font-weight: 700; font-size: 0.95rem;
            border-radius: 10px; border: none; cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.4);
        }

        .btn-comprar:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 25px rgba(37, 211, 102, 0.6);
            background: linear-gradient(90deg, #1da851, #168a42);
        }

        .pie {
            margin-top: 50px; padding-top: 20px;
            border-top: 1px solid rgba(138, 43, 226, 0.2);
            color: #8888aa; font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            .nombre-empresa { font-size: 2rem; letter-spacing: 2px; }
            .subtitulo { font-size: 17px; }
            .grid-planes { grid-template-columns: 1fr; gap: 18px; }
            .tarjeta-plan.destacado { transform: scale(1); }
            .fondo-lobo { width: 120%; }
        }
    </style>
</head>
<body>
    <div class="fondo-lobo">
        <svg viewBox="0 0 800 600" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M400 80 L250 250 L180 450 L320 520 L400 480 L480 520 L620 450 L550 250 Z" stroke="url(#gradLobo)" stroke-width="1.5" fill="rgba(10,5,30,0.3)"/>
            <path d="M280 220 L230 180 L260 240" stroke="url(#gradLobo)" stroke-width="1"/>
            <path d="M520 220 L570 180 L540 240" stroke="url(#gradLobo)" stroke-width="1"/>
            <circle cx="320" cy="320" r="8" fill="#ff33ff" filter="drop-shadow(0 0 8px #ff33ff)"/>
            <circle cx="480" cy="320" r="8" fill="#00ffff" filter="drop-shadow(0 0 8px #00ffff)"/>
            <defs>
                <linearGradient id="gradLobo" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" style="stop-color:#9933ff"/>
                    <stop offset="50%" style="stop-color:#ff33ff"/>
                    <stop offset="100%" style="stop-color:#00ffff"/>
                </linearGradient>
            </defs>
        </svg>
    </div>
    <div class="particulas"></div>

    <div class="contenedor">
        <div class="cabecera">
            <div class="volver">
                <a href="https://hostinggm.github.io/Hostinggm/" class="btn-volver">← Volver a descargas y GM</a>
            </div>
            <h1 class="nombre-empresa">PLANES DE HOSTING</h1>
            <p class="subtitulo"> Hosting SA-MP MTA:SA Bots de Discord - Precios accesibles 🐺</p>
            <div class="info-cambio" id="infoCambio">💱 Tasa USD→COP cargando...</div>
        </div>

        <div class="grid-planes" id="contenedorPlanes"></div>

        <div class="pie">© 2026 NEX Network Hosting - Todos los derechos reservados</div>
    </div>

    <script>
        let tasaCambio = 3680;

        async function cargarTasaCambio() {
            try {
                const res = await fetch('https://open.er-api.com/v6/latest/USD');
                const data = await res.json();
                if(data.result === 'success' && data.rates.COP) {
                    tasaCambio = data.rates.COP.toFixed(0);
                    document.getElementById('infoCambio').innerHTML = `💱 Tasa actual: 1 USD = ${Number(tasaCambio).toLocaleString('es-CO')} COP`;
                }
            } catch {
                document.getElementById('infoCambio').innerHTML = `💱 Tasa ref: 1 USD = ${tasaCambio.toLocaleString('es-CO')} COP`;
            }
            generarPlanes();
        }

        const listaPlanes = [
            { nombre: "INICIAL", usd: 1.52, slots: "20 Slots", ram: "512 MB RAM", disco: "8 GB", mysql: "1 Base", soporte: "Discord", destacado: false },
            { nombre: "BÁSICO", usd: 1.90, slots: "30 Slots", ram: "700 MB RAM", disco: "12 GB", mysql: "1 Base", soporte: "Discord", destacado: false },
            { nombre: "ESTÁNDAR", usd: 2.30, slots: "45 Slots", ram: "900 MB RAM", disco: "15 GB", mysql: "2 Bases", soporte: "Prioritario", destacado: false },
            { nombre: "MEDIO", usd: 2.70, slots: "60 Slots", ram: "1.1 GB RAM", disco: "20 GB", mysql: "2 Bases", soporte: "Prioritario", destacado: true },
            { nombre: "AVANZADO", usd: 3.10, slots: "75 Slots", ram: "1.3 GB RAM", disco: "25 GB", mysql: "3 Bases", soporte: "24/7", destacado: false },
            { nombre: "PRO", usd: 3.50, slots: "90 Slots", ram: "1.5 GB RAM", disco: "30 GB", mysql: "3 Bases", soporte: "24/7 + FTP", destacado: false },
            { nombre: "SEMI-DUO", usd: 4.00, slots: "2 servidores x 40", ram: "1.8 GB compartida", disco: "35 GB", mysql: "4 Bases", soporte: "Config gratis", destacado: false },
            { nombre: "DUO", usd: 4.50, slots: "2 servidores x 55", ram: "2.2 GB compartida", disco: "45 GB", mysql: "4 Bases", soporte: "Protección DDoS", destacado: false },
            { nombre: "TRÍO", usd: 5.20, slots: "3 servidores x 40", ram: "2.8 GB compartida", disco: "55 GB", mysql: "Ilimitadas", soporte: "Asesoría", destacado: false },
            { nombre: "PERSONALIZADO", usd: "A consultar", slots: "A tu medida", ram: "Hasta 4 GB total", disco: "Según necesidad", mysql: "Todas", soporte: "Instalación gratis", destacado: false }
        ];

        function generarPlanes() {
            const cont = document.getElementById('contenedorPlanes');
            cont.innerHTML = '';
            listaPlanes.forEach(plan => {
                const cop = plan.usd !== "A consultar" ? `$ ${Math.round(plan.usd * tasaCambio).toLocaleString('es-CO')} COP/mes` : "";
                const tarjeta = document.createElement('div');
                tarjeta.className = `tarjeta-plan ${plan.destacado?'destacado':''}`;
                tarjeta.innerHTML = `
                    ${plan.destacado?'<div class="etiqueta-destacado">RECOMENDADO</div>':''}
                    <h3 class="nombre-plan">${plan.nombre}</h3>
                    <div class="precio-usd">${typeof plan.usd==='number'?'$ '+plan.usd.toFixed(2)+' USD':plan.usd}</div>
                    ${cop?`<div class="precio-cop">${cop}</div>`:''}
                    <ul class="caracteristicas">
                        <li>${plan.slots}</li>
                        <li>${plan.ram}</li>
                        <li>${plan.disco} almacenamiento</li>
                        <li>${plan.mysql} MySQL</li>
                        <li>${plan.soporte}</li>
                    </ul>
                    <a href="https://discord.gg/EH35DA2KHW" class="btn-comprar" target="_blank">💬 Ir al Discord</a>
                `;
                cont.appendChild(tarjeta);
            });
        }

        document.addEventListener('DOMContentLoaded', cargarTasaCambio);
    </script>
</body>
</html>
